<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manny's Spring 2026 Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f11;
    --surface: #18181c;
    --surface2: #222228;
    --border: #2e2e38;
    --text: #f0f0f5;
    --muted: #6b6b7e;
    --accent: #7c6af7;
    --accent2: #f97316;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
    --pink: #ec4899;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 32px;
  }

  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 40px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #f0f0f5 30%, #7c6af7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-left p {
    color: var(--muted);
    font-size: 0.78rem;
    margin-top: 4px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .stats {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .stat-pill span {
    color: var(--text);
    font-weight: 500;
    margin-left: 6px;
  }

  /* CLASSES LEGEND */
  .classes-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .class-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 0.72rem;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: border-color 0.2s, opacity 0.2s;
  }

  .class-tag:hover { border-color: var(--accent); }
  .class-tag.inactive { opacity: 0.35; }

  .class-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .toolbar input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  .toolbar input:focus { border-color: var(--accent); }
  .toolbar input::placeholder { color: var(--muted); }

  .toolbar select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
  }

  .btn-add {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 20px;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.2s, transform 0.1s;
    margin-left: auto;
  }

  .btn-add:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 500;
    white-space: nowrap;
    user-select: none;
    cursor: pointer;
  }

  th:hover { color: var(--text); }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.done-row { opacity: 0.45; }

  td {
    padding: 13px 16px;
    font-size: 0.78rem;
    vertical-align: middle;
  }

  .assignment-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    max-width: 260px;
  }

  .done-row .assignment-name {
    text-decoration: line-through;
  }

  /* CLASS BADGE */
  .class-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    font-weight: 500;
    white-space: nowrap;
  }

  /* STATUS */
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    transition: opacity 0.2s;
    white-space: nowrap;
    user-select: none;
  }

  .status-badge:hover { opacity: 0.75; }

  .status-dot { width: 6px; height: 6px; border-radius: 50%; }

  .s-todo { background: rgba(107,107,126,0.15); color: var(--muted); border-color: rgba(107,107,126,0.3); }
  .s-todo .status-dot { background: var(--muted); }
  .s-inprog { background: rgba(234,179,8,0.12); color: var(--yellow); border-color: rgba(234,179,8,0.3); }
  .s-inprog .status-dot { background: var(--yellow); }
  .s-done { background: rgba(34,197,94,0.12); color: var(--green); border-color: rgba(34,197,94,0.3); }
  .s-done .status-dot { background: var(--green); }

  /* PRIORITY */
  .priority-badge {
    font-size: 0.7rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 5px;
  }

  .p-high { background: rgba(239,68,68,0.12); color: var(--red); }
  .p-med { background: rgba(249,115,22,0.12); color: var(--accent2); }
  .p-low { background: rgba(59,130,246,0.12); color: var(--blue); }

  /* DUE DATE */
  .due-date {
    font-size: 0.75rem;
    color: var(--muted);
    white-space: nowrap;
  }

  .due-overdue { color: var(--red); }
  .due-soon { color: var(--yellow); }

  /* DELETE BTN */
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }

  .del-btn:hover { color: var(--red); background: rgba(239,68,68,0.1); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 480px;
    max-width: 95vw;
    animation: slideUp 0.2s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .form-group {
    margin-bottom: 16px;
  }

  .form-group label {
    display: block;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }

  .form-group textarea { resize: vertical; min-height: 70px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
  }

  .btn-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 20px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    cursor: pointer;
    transition: color 0.2s;
  }

  .btn-cancel:hover { color: var(--text); }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 9px 24px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .btn-save:hover { opacity: 0.85; }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 0.82rem;
  }

  .empty-state div { font-size: 2rem; margin-bottom: 10px; }

  .progress-bar-wrap {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    width: 80px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>📚 Spring 2026 Planner</h1>
    <p>Concordia University Chicago &nbsp;·&nbsp; Manny's Assignments</p>
  </div>
  <div class="stats">
    <div class="stat-pill">Total <span id="stat-total">0</span></div>
    <div class="stat-pill">In Progress <span id="stat-inprog">0</span></div>
    <div class="stat-pill">Done <span id="stat-done">0</span></div>
  </div>
</header>

<div class="classes-row" id="classFilters"></div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="Search assignments..." oninput="renderTable()">
  <select id="filterStatus" onchange="renderTable()">
    <option value="">All Statuses</option>
    <option value="Not Started">Not Started</option>
    <option value="In Progress">In Progress</option>
    <option value="Done">Done</option>
  </select>
  <select id="filterPriority" onchange="renderTable()">
    <option value="">All Priorities</option>
    <option value="High">High</option>
    <option value="Medium">Medium</option>
    <option value="Low">Low</option>
  </select>
  <button class="btn-add" onclick="openModal()">+ Add Assignment</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('name')">Assignment</th>
        <th onclick="sortBy('class')">Class</th>
        <th onclick="sortBy('due')">Due Date</th>
        <th onclick="sortBy('priority')">Priority</th>
        <th onclick="sortBy('status')">Status</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <div>📝</div>
    No assignments yet — hit <strong>+ Add Assignment</strong> to get started.
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">New Assignment</h2>
    <div class="form-group">
      <label>Assignment Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Chapter 5 Homework">
    </div>
    <div class="form-group">
      <label>Class *</label>
      <select id="f-class">
        <option value="">Select class...</option>
        <option>Business Ethics (MGT-3100)</option>
        <option>College Algebra (MAT-1805)</option>
        <option>Creating Breakthrough Innovations (ENT-2031)</option>
        <option>Managerial Accounting (ACC-2150)</option>
        <option>Marketing (MKT-2200)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Due Date</label>
      <input type="date" id="f-due">
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="f-priority">
        <option value="Medium">Medium</option>
        <option value="High">High</option>
        <option value="Low">Low</option>
      </select>
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="f-status">
        <option value="Not Started">Not Started</option>
        <option value="In Progress">In Progress</option>
        <option value="Done">Done</option>
      </select>
    </div>
    <div class="form-group">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Any extra details..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveAssignment()">Save</button>
    </div>
  </div>
</div>

<script>
const CLASSES = [
  { name: "Business Ethics (MGT-3100)", color: "#ec4899", short: "Ethics" },
  { name: "College Algebra (MAT-1805)", color: "#3b82f6", short: "Algebra" },
  { name: "Creating Breakthrough Innovations (ENT-2031)", color: "#f97316", short: "Innovations" },
  { name: "Managerial Accounting (ACC-2150)", color: "#22c55e", short: "Accounting" },
  { name: "Marketing (MKT-2200)", color: "#7c6af7", short: "Marketing" },
];

let assignments = [
  { id: 1, name: "Chapter 1 Review Questions", class: "Business Ethics (MGT-3100)", due: "2026-03-20", priority: "Medium", status: "Not Started", notes: "" },
  { id: 2, name: "Algebra Problem Set 3", class: "College Algebra (MAT-1805)", due: "2026-03-18", priority: "High", status: "In Progress", notes: "" },
  { id: 3, name: "Innovation Case Study", class: "Creating Breakthrough Innovations (ENT-2031)", due: "2026-03-25", priority: "High", status: "Not Started", notes: "" },
  { id: 4, name: "Stockholders' Equity Journal Entries", class: "Managerial Accounting (ACC-2150)", due: "2026-03-17", priority: "High", status: "In Progress", notes: "Morrow Enterprises problem" },
  { id: 5, name: "Marketing Strategy Analysis", class: "Marketing (MKT-2200)", due: "2026-03-28", priority: "Medium", status: "Not Started", notes: "" },
];

let nextId = 6;
let editingId = null;
let sortKey = "due";
let sortDir = 1;
let activeFilters = new Set(CLASSES.map(c => c.name));

function getClassMeta(name) {
  return CLASSES.find(c => c.name === name) || { color: "#6b6b7e", short: name };
}

function formatDue(dateStr) {
  if (!dateStr) return '<span class="due-date">—</span>';
  const d = new Date(dateStr + "T00:00:00");
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  const label = d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
  let cls = "due-date";
  let tag = "";
  if (diff < 0) { cls = "due-date due-overdue"; tag = " ⚠️"; }
  else if (diff <= 3) { cls = "due-date due-soon"; tag = " 🔥"; }
  return `<span class="${cls}">${label}${tag}</span>`;
}

function statusClass(s) {
  if (s === "Done") return "s-done";
  if (s === "In Progress") return "s-inprog";
  return "s-todo";
}

function priorityClass(p) {
  if (p === "High") return "p-high";
  if (p === "Low") return "p-low";
  return "p-med";
}

function cycleStatus(id) {
  const a = assignments.find(x => x.id === id);
  if (!a) return;
  const cycle = ["Not Started", "In Progress", "Done"];
  a.status = cycle[(cycle.indexOf(a.status) + 1) % 3];
  renderTable(); updateStats();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  renderTable();
}

function renderTable() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const sFilter = document.getElementById("filterStatus").value;
  const pFilter = document.getElementById("filterPriority").value;

  let list = assignments.filter(a => {
    if (!activeFilters.has(a.class)) return false;
    if (search && !a.name.toLowerCase().includes(search) && !a.class.toLowerCase().includes(search)) return false;
    if (sFilter && a.status !== sFilter) return false;
    if (pFilter && a.priority !== pFilter) return false;
    return true;
  });

  list.sort((a, b) => {
    let av = a[sortKey] || "", bv = b[sortKey] || "";
    if (sortKey === "due") { av = av || "9999"; bv = bv || "9999"; }
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  const tbody = document.getElementById("tableBody");
  document.getElementById("emptyState").style.display = list.length ? "none" : "block";

  tbody.innerHTML = list.map(a => {
    const meta = getClassMeta(a.class);
    return `<tr class="${a.status === 'Done' ? 'done-row' : ''}" onclick="openEdit(${a.id})">
      <td><div class="assignment-name">${a.name}</div>${a.notes ? `<div style="font-size:0.68rem;color:var(--muted);margin-top:3px">${a.notes}</div>` : ""}</td>
      <td><span class="class-badge" style="background:${meta.color}22;color:${meta.color}">${meta.short}</span></td>
      <td>${formatDue(a.due)}</td>
      <td><span class="priority-badge ${priorityClass(a.priority)}">${a.priority}</span></td>
      <td onclick="event.stopPropagation(); cycleStatus(${a.id})">
        <span class="status-badge ${statusClass(a.status)}">
          <span class="status-dot"></span>${a.status}
        </span>
      </td>
      <td onclick="event.stopPropagation()">
        <button class="del-btn" onclick="deleteA(${a.id})">✕</button>
      </td>
    </tr>`;
  }).join("");

  updateStats();
}

function updateStats() {
  document.getElementById("stat-total").textContent = assignments.length;
  document.getElementById("stat-inprog").textContent = assignments.filter(a => a.status === "In Progress").length;
  document.getElementById("stat-done").textContent = assignments.filter(a => a.status === "Done").length;
}

function renderClassFilters() {
  const wrap = document.getElementById("classFilters");
  wrap.innerHTML = CLASSES.map(c => `
    <div class="class-tag ${activeFilters.has(c.name) ? '' : 'inactive'}" onclick="toggleFilter('${c.name}')">
      <span class="class-dot" style="background:${c.color}"></span>
      ${c.short}
    </div>
  `).join("");
}

function toggleFilter(name) {
  if (activeFilters.has(name)) activeFilters.delete(name);
  else activeFilters.add(name);
  renderClassFilters();
  renderTable();
}

function openModal() {
  editingId = null;
  document.getElementById("modalTitle").textContent = "New Assignment";
  document.getElementById("f-name").value = "";
  document.getElementById("f-class").value = "";
  document.getElementById("f-due").value = "";
  document.getElementById("f-priority").value = "Medium";
  document.getElementById("f-status").value = "Not Started";
  document.getElementById("f-notes").value = "";
  document.getElementById("modalOverlay").classList.add("open");
}

function openEdit(id) {
  const a = assignments.find(x => x.id === id);
  if (!a) return;
  editingId = id;
  document.getElementById("modalTitle").textContent = "Edit Assignment";
  document.getElementById("f-name").value = a.name;
  document.getElementById("f-class").value = a.class;
  document.getElementById("f-due").value = a.due;
  document.getElementById("f-priority").value = a.priority;
  document.getElementById("f-status").value = a.status;
  document.getElementById("f-notes").value = a.notes;
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

function saveAssignment() {
  const name = document.getElementById("f-name").value.trim();
  const cls = document.getElementById("f-class").value;
  if (!name || !cls) { alert("Please fill in the Assignment Name and Class."); return; }
  const obj = {
    name,
    class: cls,
    due: document.getElementById("f-due").value,
    priority: document.getElementById("f-priority").value,
    status: document.getElementById("f-status").value,
    notes: document.getElementById("f-notes").value.trim(),
  };
  if (editingId) {
    const idx = assignments.findIndex(a => a.id === editingId);
    assignments[idx] = { ...assignments[idx], ...obj };
  } else {
    assignments.push({ id: nextId++, ...obj });
  }
  closeModal();
  renderTable();
}

function deleteA(id) {
  assignments = assignments.filter(a => a.id !== id);
  renderTable();
}

document.getElementById("modalOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeModal();
});

renderClassFilters();
renderTable();
</script>
</body>
</html>
