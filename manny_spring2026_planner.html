<style>

  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;padding:40px 32px}
  header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:40px;flex-wrap:wrap;gap:16px}
  .header-left h1{font-family:'Syne',sans-serif;font-size:2.4rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#f0f0f5 30%,#7c6af7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header-left p{color:var(--muted);font-size:.78rem;margin-top:4px;letter-spacing:.08em;text-transform:uppercase}
  .stats{display:flex;gap:12px;flex-wrap:wrap}
  .stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 16px;font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  .stat-pill span{color:var(--text);font-weight:500;margin-left:6px}
  .sync-bar{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--muted);margin-bottom:20px}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:background .3s}
  .sync-dot.syncing{background:var(--yellow);animation:pulse 1s infinite}
  .sync-dot.synced{background:var(--green)}
  .sync-dot.error{background:var(--red)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .classes-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
  .class-tag{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:6px 14px;font-size:.72rem;cursor:pointer;transition:border-color .2s,opacity .2s}
  .class-tag:hover{border-color:var(--accent)}
  .class-tag.inactive{opacity:.35}
  .class-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .toolbar{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .toolbar input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;width:220px;outline:none;transition:border-color .2s}
  .toolbar input:focus{border-color:var(--accent)}
  .toolbar input::placeholder{color:var(--muted)}
  .toolbar select{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:.78rem;outline:none;cursor:pointer}
  .btn-add{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 20px;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;letter-spacing:.04em;transition:opacity .2s,transform .1s;margin-left:auto}
  .btn-add:hover{opacity:.85;transform:translateY(-1px)}
  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
  table{width:100%;border-collapse:collapse}
  thead tr{background:var(--surface2);border-bottom:1px solid var(--border)}
  th{padding:12px 16px;text-align:left;font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:500;white-space:nowrap;user-select:none;cursor:pointer}
  th:hover{color:var(--text)}
  tbody tr{border-bottom:1px solid var(--border);transition:background .15s;cursor:pointer}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:var(--surface2)}
  tbody tr.done-row{opacity:.45}
  td{padding:13px 16px;font-size:.78rem;vertical-align:middle}
  .assignment-name{font-family:'Syne',sans-serif;font-weight:600;font-size:.85rem;max-width:280px}
  .done-row .assignment-name{text-decoration:line-through}
  .class-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:.68rem;font-weight:500;white-space:nowrap}
  .status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:.7rem;font-weight:500;cursor:pointer;border:1px solid transparent;transition:opacity .2s;white-space:nowrap;user-select:none}
  .status-badge:hover{opacity:.75}
  .status-dot{width:6px;height:6px;border-radius:50%}
  .s-todo{background:rgba(107,107,126,.15);color:var(--muted);border-color:rgba(107,107,126,.3)}
  .s-todo .status-dot{background:var(--muted)}
  .s-inprog{background:rgba(234,179,8,.12);color:var(--yellow);border-color:rgba(234,179,8,.3)}
  .s-inprog .status-dot{background:var(--yellow)}
  .s-done{background:rgba(34,197,94,.12);color:var(--green);border-color:rgba(34,197,94,.3)}
  .s-done .status-dot{background:var(--green)}
  .priority-badge{font-size:.7rem;font-weight:500;padding:3px 10px;border-radius:5px}
  .p-high{background:rgba(239,68,68,.12);color:var(--red)}
  .p-med{background:rgba(249,115,22,.12);color:var(--accent2)}
  .p-low{background:rgba(59,130,246,.12);color:var(--blue)}
  .due-date{font-size:.75rem;color:var(--muted);white-space:nowrap}
  .due-overdue{color:var(--red)}
  .due-soon{color:var(--yellow)}
  .del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:4px 8px;border-radius:4px;transition:color .2s,background .2s}
  .del-btn:hover{color:var(--red);background:rgba(239,68,68,.1)}
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:480px;max-width:95vw;animation:slideUp .2s ease}
  @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:24px}
  .form-group{margin-bottom:16px}
  .form-group label{display:block;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px}
  .form-group input,.form-group select,.form-group textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;outline:none;transition:border-color .2s}
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
  .form-group textarea{resize:vertical;min-height:70px}
  .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
  .btn-cancel{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:.78rem;cursor:pointer}
  .btn-save{background:var(--accent);border:none;border-radius:8px;padding:9px 24px;color:#fff;font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer}
  .btn-save:hover{opacity:.85}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:.82rem}
  .empty-state div{font-size:2rem;margin-bottom:10px}
  .loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:.82rem}
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1>📚 Spring 2026 Planner</h1>
    <p>Concordia University Chicago &nbsp;·&nbsp; Manny's Assignments</p>
  </div>
  <div class="stats">

  </div>

<div class="classes-row" id="classFilters"></div>
<div class="toolbar">

  <select id="filterStatus" onchange="renderTable()"><option value="">All Statuses</option><option>Not Started</option><option>In Progress</option><option>Done</option></select>
  <select id="filterPriority" onchange="renderTable()"><option value="">All Priorities</option><option>High</option><option>Medium</option><option>Low</option></select>
  <button class="btn-add" onclick="openModal()">+ Add Assignment</button>
</div>
<div class="table-wrap">
  <table><thead><tr>
    <th onclick="sortBy('name')">Assignment</th>
    <th onclick="sortBy('class')">Class</th>
    <th onclick="sortBy('due')">Due Date</th>
    <th onclick="sortBy('priority')">Priority</th>
    <th onclick="sortBy('status')">Status</th>
    <th></th>
  </tr></thead><tbody id="tableBody"></tbody></table>
  <div class="loading" id="loadingState">Loading your assignments...</div>
  <div class="empty-state" id="emptyState" style="display:none"><div>📝</div>No assignments found.</div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">New Assignment</h2>
    <div class="form-group"><label>Assignment Name *</label><input type="text" id="f-name" placeholder="e.g. Chapter 5 Homework"></div>
    <div class="form-group"><label>Class *</label><select id="f-class"><option value="">Select class...</option><option>Business Ethics (MGT-3100)</option><option>College Algebra (MAT-1805)</option><option>Creating Breakthrough Innovations (ENT-2031)</option><option>Managerial Accounting (ACC-2150)</option><option>Marketing (MKT-2200)</option></select></div>
    <div class="form-group"><label>Due Date</label><input type="date" id="f-due"></div>
    <div class="form-group"><label>Priority</label><select id="f-priority"><option value="Medium">Medium</option><option value="High">High</option><option value="Low">Low</option></select></div>
    <div class="form-group"><label>Status</label><select id="f-status"><option value="Not Started">Not Started</option><option value="In Progress">In Progress</option><option value="Done">Done</option></select></div>
    <div class="form-group"><label>Notes</label><textarea id="f-notes" placeholder="Any extra details..."></textarea></div>
    <div class="modal-actions"><button class="btn-cancel" onclick="closeModal()">Cancel</button><button class="btn-save" onclick="saveAssignment()">Save</button></div>
  </div>
</div>

  {id:66,name:"Assignment #8: PR28-2A, PR28-3A, PR28-4A",class:"Managerial Accounting (ACC-2150)",due:"2026-05-03",priority:"High",status:"Not Started",notes:"Week 8 — CengageNow: Ch.28 Balanced Scorecard & Social Responsibility"},
  {id:67,name:"Discussion Forum #14",class:"Managerial Accounting (ACC-2150)",due:"2026-05-03",priority:"Medium",status:"Not Started",notes:"Week 8 — How can balanced scorecard address CSR?"},
  {id:68,name:"Exam 3 (Chapters 23-28)",class:"Managerial Accounting (ACC-2150)",due:"2026-05-03",priority:"High",status:"Not Started",notes:"Week 8 — 100 points: Standard Cost, Decentralized Ops, Pricing, Capital Investment, Lean, BSC"},

  // ── MARKETING (MKT-2200) ─────────────────────────────────────────────────
  {id:70,name:"Marketing Assignments — Add from Blackboard",class:"Marketing (MKT-2200)",due:"",priority:"Medium",status:"Not Started",notes:"No syllabus uploaded yet — add your MKT-2200 assignments here"}
];

let assignments=[],nextId=100,editingId=null,sortKey="due",sortDir=1,saveTimeout=null;
let activeFilters=new Set(CLASSES.map(c=>c.name));

function setSyncState(s,l){document.getElementById("syncDot").className="sync-dot "+s;document.getElementById("syncLabel").textContent=l}

async function loadFromSheets(){
  setSyncState("syncing","Loading from Google Sheets...");
  try{
    const res=await fetch(API_URL+"?action=getAll");
    const data=await res.json();
    if(data.length>0){assignments=data.map(a=>({...a,id:Number(a.id)}));nextId=Math.max(...assignments.map(a=>a.id))+1;}
    else{assignments=SEED.map(a=>({...a}));nextId=Math.max(...assignments.map(a=>a.id))+1;await saveToSheets();}
    document.getElementById("loadingState").style.display="none";
    setSyncState("synced","Synced with Google Sheets ✓");
    renderClassFilters();renderTable();
  }catch(err){
    setSyncState("error","Could not connect — showing local data");
    assignments=SEED.map(a=>({...a}));nextId=Math.max(...assignments.map(a=>a.id))+1;
    document.getElementById("loadingState").style.display="none";
    renderClassFilters();renderTable();
  }
}

async function saveToSheets(){
  setSyncState("syncing","Saving...");
  try{await fetch(API_URL,{method:"POST",body:JSON.stringify({action:"save",assignments})});setSyncState("synced","Saved to Google Sheets ✓");}
  catch(err){setSyncState("error","Save failed — check connection");}
}

function scheduleSave(){clearTimeout(saveTimeout);saveTimeout=setTimeout(saveToSheets,800);}
function getClassMeta(n){return CLASSES.find(c=>c.name===n)||{color:"#6b6b7e",short:n};}

function formatDue(d){
  if(!d)return'<span class="due-date">—</span>';
  const dt=new Date(d+"T00:00:00"),today=new Date();today.setHours(0,0,0,0);
  const diff=Math.round((dt-today)/86400000),label=dt.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  let cls="due-date",tag="";
  if(diff<0){cls="due-date due-overdue";tag=" ⚠️";}else if(diff<=3){cls="due-date due-soon";tag=" 🔥";}
  return`<span class="${cls}">${label}${tag}</span>`;
}

function statusClass(s){return s==="Done"?"s-done":s==="In Progress"?"s-inprog":"s-todo";}
function priorityClass(p){return p==="High"?"p-high":p==="Low"?"p-low":"p-med";}

function cycleStatus(id){
  const a=assignments.find(x=>x.id===id);if(!a)return;
  const c=["Not Started","In Progress","Done"];
  a.status=c[(c.indexOf(a.status)+1)%3];renderTable();scheduleSave();
}

function sortBy(key){if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=1;}renderTable();}

function renderTable(){
  const search=document.getElementById("searchInput").value.toLowerCase();
  const sF=document.getElementById("filterStatus").value,pF=document.getElementById("filterPriority").value;
  let list=assignments.filter(a=>{
    if(!activeFilters.has(a.class))return false;
    if(search&&!a.name.toLowerCase().includes(search)&&!a.class.toLowerCase().includes(search))return false;
    if(sF&&a.status!==sF)return false;if(pF&&a.priority!==pF)return false;return true;
  });
  list.sort((a,b)=>{let av=a[sortKey]||"",bv=b[sortKey]||"";if(sortKey==="due"){av=av||"9999";bv=bv||"9999";}return av<bv?-sortDir:av>bv?sortDir:0;});
  const tbody=document.getElementById("tableBody");
  document.getElementById("emptyState").style.display=list.length?"none":"block";
  tbody.innerHTML=list.map(a=>{
    const m=getClassMeta(a.class);
    return`<tr class="${a.status==="Done"?"done-row":""}" onclick="openEdit(${a.id})">
      <td><div class="assignment-name">${a.name}</div>${a.notes?`<div style="font-size:.68rem;color:var(--muted);margin-top:3px">${a.notes}</div>`:""}</td>
      <td><span class="class-badge" style="background:${m.color}22;color:${m.color}">${m.short}</span></td>
      <td>${formatDue(a.due)}</td>
      <td><span class="priority-badge ${priorityClass(a.priority)}">${a.priority}</span></td>
      <td onclick="event.stopPropagation();cycleStatus(${a.id})"><span class="status-badge ${statusClass(a.status)}"><span class="status-dot"></span>${a.status}</span></td>
      <td onclick="event.stopPropagation()"><button class="del-btn" onclick="deleteA(${a.id})">✕</button></td>
    </tr>`;
  }).join("");
  updateStats();
}

function updateStats(){
  document.getElementById("stat-total").textContent=assignments.length;
  document.getElementById("stat-inprog").textContent=assignments.filter(a=>a.status==="In Progress").length;
  document.getElementById("stat-done").textContent=assignments.filter(a=>a.status==="Done").length;
}

function renderClassFilters(){
  document.getElementById("classFilters").innerHTML=CLASSES.map(c=>`
    <div class="class-tag ${activeFilters.has(c.name)?"":"inactive"}" onclick="toggleFilter('${c.name}')">
      <span class="class-dot" style="background:${c.color}"></span>${c.short}</div>`).join("");
}

function toggleFilter(n){if(activeFilters.has(n))activeFilters.delete(n);else activeFilters.add(n);renderClassFilters();renderTable();}

function openModal(){
  editingId=null;document.getElementById("modalTitle").textContent="New Assignment";
  ["f-name","f-class","f-due","f-notes"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("f-priority").value="Medium";document.getElementById("f-status").value="Not Started";
  document.getElementById("modalOverlay").classList.add("open");
}

function openEdit(id){
  const a=assignments.find(x=>x.id===id);if(!a)return;editingId=id;
  document.getElementById("modalTitle").textContent="Edit Assignment";
  document.getElementById("f-name").value=a.name;document.getElementById("f-class").value=a.class;
  document.getElementById("f-due").value=a.due;document.getElementById("f-priority").value=a.priority;
  document.getElementById("f-status").value=a.status;document.getElementById("f-notes").value=a.notes;
  document.getElementById("modalOverlay").classList.add("open");
}

function closeModal(){document.getElementById("modalOverlay").classList.remove("open");}

function saveAssignment(){
  const name=document.getElementById("f-name").value.trim(),cls=document.getElementById("f-class").value;
  if(!name||!cls){alert("Please fill in the Assignment Name and Class.");return;}
  const obj={name,class:cls,due:document.getElementById("f-due").value,priority:document.getElementById("f-priority").value,status:document.getElementById("f-status").value,notes:document.getElementById("f-notes").value.trim()};
  if(editingId){const idx=assignments.findIndex(a=>a.id===editingId);assignments[idx]={...assignments[idx],...obj};}
  else assignments.push({id:nextId++,...obj});
  closeModal();renderTable();scheduleSave();
}

function deleteA(id){assignments=assignments.filter(a=>a.id!==id);renderTable();scheduleSave();}
document.getElementById("modalOverlay").addEventListener("click",function(e){if(e.target===this)closeModal();});

// Clear Google Sheets and reload fresh with corrected data
async function initWithReset(){
  setSyncState("syncing","Loading from Google Sheets...");
  try{
    const res=await fetch(API_URL+"?action=getAll");
    const data=await res.json();
    // Always reload seed since we corrected the data
    assignments=SEED.map(a=>({...a}));nextId=Math.max(...assignments.map(a=>a.id))+1;
    await saveToSheets();
    document.getElementById("loadingState").style.display="none";
    setSyncState("synced","Synced with Google Sheets ✓");
    renderClassFilters();renderTable();
  }catch(err){
    assignments=SEED.map(a=>({...a}));nextId=Math.max(...assignments.map(a=>a.id))+1;
    document.getElementById("loadingState").style.display="none";
    setSyncState("error","Could not connect — showing local data");
    renderClassFilters();renderTable();
  }
}
initWithReset();
</script>
